<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaiCoder's | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --text: #f5f5f5; --glass: rgba(255,255,255,0.05); }
        .light { --bg: #f5f5f5; --text: #0a0a0a; --glass: rgba(0,0,0,0.05); }
        
        body { background-color: var(--bg); color: var(--text); transition: background-color 0.5s ease; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Grainy Texture Overlay */
        .noise::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.15; z-index: 50; pointer-events: none;
        }

        .serif { font-family: 'Cormorant Garamond', serif; font-style: italic; }
        
        .glass {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 999px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .dot-pattern {
            background-image: radial-gradient(rgba(255,255,255,0.2) 1px, transparent 1px);
            background-size: 4px 4px;
        }

        /* Animated Gem Style */
        .gem { position: absolute; width: 12px; height: 12px; background: #fbbf24; transform: rotate(45deg); filter: blur(1px); pointer-events: none; }
    </style>
</head>
<body class="noise h-screen w-screen flex items-center justify-center">

    <button onclick="toggleTheme()" class="fixed top-8 right-8 glass px-4 py-2 text-sm font-medium z-[100] flex items-center gap-2 hover:scale-105 transition-transform">
        <span id="theme-icon">🌙</span> <span id="theme-text">Dark</span>
    </button>

    <div class="relative flex flex-col items-center">
        
        <div class="flex gap-4 mb-[-20px] z-20">
            <div class="glass px-6 py-1 text-[10px] tracking-[0.3em] uppercase opacity-70 border-none">Developing Solutions</div>
            <div class="glass px-4 py-1 text-[10px] tracking-widest uppercase border-pink-500/30 text-pink-400">Coming Soon</div>
        </div>

        <div class="relative group">
            <h1 class="text-[12vw] serif tracking-tighter select-none leading-none opacity-90">
                MaiCoder's
            </h1>
            
            <div class="absolute top-1/2 left-[-5%] w-[40%] h-[25%] glass dot-pattern opacity-80 animate-pulse"></div>
            <div class="absolute top-[10%] right-[-10%] w-[45%] h-[30%] glass dot-pattern opacity-80" style="animation: bounce 6s infinite"></div>
        </div>

        <div class="flex items-center gap-4 mt-[-10px] z-20">
            <div class="glass p-1 pr-4 flex items-center gap-2">
                <div class="w-6 h-6 rounded-full bg-white/10 flex items-center justify-center text-[10px]">A</div>
                <span class="text-[10px] uppercase tracking-tighter opacity-60">Portfolio 2026</span>
            </div>
            <div class="glass px-4 py-1 text-[10px] uppercase tracking-tighter opacity-80 flex items-center gap-2">
                App-ads.txt verified <span class="text-green-400">●</span>
            </div>
        </div>
    </div>

    <div id="gem-container"></div>

    <script>
        // Theme Toggle Logic
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                html.classList.add('light');
                icon.innerText = '☀️';
                text.innerText = 'Light';
            } else {
                html.classList.remove('light');
                html.classList.add('dark');
                icon.innerText = '🌙';
                text.innerText = 'Dark';
            }
        }

        // Animated "Gems" Game Effect
        const container = document.getElementById('gem-container');
        const gemCount = 8;
        const gems = [];

        for(let i=0; i<gemCount; i++) {
            const gem = document.createElement('div');
            gem.className = 'gem';
            container.appendChild(gem);
            gems.push({
                el: gem,
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2
            });
        }

        function animate() {
            gems.forEach(g => {
                g.x += g.vx;
                g.y += g.vy;
                if(g.x < 0 || g.x > window.innerWidth) g.vx *= -1;
                if(g.y < 0 || g.y > window.innerHeight) g.vy *= -1;
                g.el.style.transform = `translate(${g.x}px, ${g.y}px) rotate(45deg)`;
            });
            requestAnimationFrame(animate);
        }
        animate();

        // Mouse interaction for gems
        window.addEventListener('mousemove', (e) => {
            gems.forEach(g => {
                const dx = e.clientX - g.x;
                const dy = e.clientY - g.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 100) {
                    g.vx -= dx * 0.001;
                    g.vy -= dy * 0.001;
                }
            });
        });
    </script>

    <style>
        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
    </style>
</body>
</html>
